<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>برجر هاوس</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #FAF3E0;
    direction: rtl;
}

/* Navbar */
.navbar {
    background: #A3B18A;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}

/* صورة */
.image {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

/* محتوى */
.container {
    padding: 20px;
}

.title {
    font-size: 28px;
    color: #344E41;
    margin-bottom: 10px;
}

.desc {
    color: #666;
    margin-bottom: 20px;
}

/* المنتجات */
.food-item {
    background: white;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.food-name {
    font-weight: bold;
}

.price {
    color: #344E41;
}

/* زر */
.btn {
    background: #A3B18A;
    border: none;
    padding: 10px 15px;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}

.btn:hover {
    background: #8FA17A;
}
</style>
</head>

<body>

<div class="navbar">برجر هاوس 🍔</div>

<img class="image" src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">

<div class="container">

<div class="title">أفضل برجر في مصراتة</div>
<div class="desc">استمتع بألذ أنواع البرجر مع بطاطا ومشروبات</div>

<div class="food-item">
    <div>
        <div class="food-name">برجر لحم</div>
        <div class="price">15 دينار</div>
    </div>
    <button class="btn">إضافة</button>
</div>

<div class="food-item">
    <div>
        <div class="food-name">برجر دجاج</div>
        <div class="price">13 دينار</div>
    </div>
    <button class="btn">إضافة</button>
</div>

<div class="food-item">
    <div>
        <div class="food-name">بطاطا</div>
        <div class="price">5 دينار</div>
    </div>
    <button class="btn">إضافة</button>
</div>

</div>

</body>
</html>
