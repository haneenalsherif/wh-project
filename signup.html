<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - WH App</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial;
}

body {
    background: linear-gradient(135deg, #FAF3E0, #EDE0D4);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.signup-container {
    width: 100%;
    max-width: 450px;
    background: white;
    padding: 35px;
    border-radius: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.logo {
    text-align: center;
    font-size: 32px;
    font-weight: bold;
    color: #344E41;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    color: #6B705C;
    margin-bottom: 25px;
}

.input-group {
    margin-bottom: 15px;
}

.input-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: bold;
    color: #344E41;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #DAD7CD;
    background: #FAF3E0;
    outline: none;
}

.error {
    color: #b00020;
    font-size: 13px;
    margin-top: 5px;
    display: block;
    min-height: 18px;
}

.success-message {
    text-align: center;
    color: #2e7d32;
    font-size: 14px;
    margin-bottom: 12px;
    min-height: 20px;
}

.btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: #A3B18A;
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    font-size: 15px;
}

.btn:hover {
    background: #8FA17A;
}

.btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}

.login-link {
    text-align: center;
    margin-top: 15px;
}

.login-link a {
    text-decoration: none;
    color: #344E41;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="signup-container">

<div class="logo">WH App</div>
<div class="subtitle">Create your account</div>
<div class="success-message" id="successMessage"></div>

<form onsubmit="return signupUser(event)">

<div class="input-group">
<label>Full Name</label>
<input id="fullName" type="text">
<small class="error" id="nameError"></small>
</div>

<div class="input-group">
<label>Email</label>
<input id="email" type="text">
<small class="error" id="emailError"></small>
</div>

<div class="input-group">
<label>Phone</label>
<input id="phone" type="text">
<small class="error" id="phoneError"></small>
</div>

<div class="input-group">
<label>Password</label>
<input id="password" type="password">
<small class="error" id="passwordError"></small>
</div>

<div class="input-group">
<label>Confirm Password</label>
<input id="confirmPassword" type="password">
<small class="error" id="confirmError"></small>
</div>

<button class="btn" id="signupBtn">Create Account</button>

</form>

<div class="login-link">
Already have an account? <a href="login.html">Sign In</a>
</div>

</div>

<script>
async function signupUser(event) {
    event.preventDefault();

    let name = document.getElementById("fullName").value.trim();
    let email = document.getElementById("email").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let password = document.getElementById("password").value.trim();
    let confirmPassword = document.getElementById("confirmPassword").value.trim();

    let nameError = document.getElementById("nameError");
    let emailError = document.getElementById("emailError");
    let phoneError = document.getElementById("phoneError");
    let passwordError = document.getElementById("passwordError");
    let confirmError = document.getElementById("confirmError");
    let successMessage = document.getElementById("successMessage");
    let signupBtn = document.getElementById("signupBtn");

    nameError.textContent = "";
    emailError.textContent = "";
    phoneError.textContent = "";
    passwordError.textContent = "";
    confirmError.textContent = "";
    successMessage.textContent = "";

    let valid = true;

    if (name === "") {
        nameError.textContent = "Full name is required";
        valid = false;
    }

    let isEmail = email.includes("@") && email.includes(".");
    if (email === "") {
        emailError.textContent = "Email is required";
        valid = false;
    } else if (!isEmail) {
        emailError.textContent = "Enter a valid email";
        valid = false;
    }

    let isPhone = /^(091|092|093)[0-9]{7}$/.test(phone);
    if (phone === "") {
        phoneError.textContent = "Phone is required";
        valid = false;
    } else if (!isPhone) {
        phoneError.textContent = "Phone must start with 091, 092, or 093";
        valid = false;
    }

    if (password === "") {
        passwordError.textContent = "Password is required";
        valid = false;
    } else if (password.length < 6) {
        passwordError.textContent = "Minimum 6 characters";
        valid = false;
    }

    if (confirmPassword === "") {
        confirmError.textContent = "Confirm your password";
        valid = false;
    } else if (password !== confirmPassword) {
        confirmError.textContent = "Passwords do not match";
        valid = false;
    }

    if (!valid) {
        return false;
    }

    signupBtn.disabled = true;
    signupBtn.textContent = "Creating...";

    try {
        const response = await fetch("/api/signup", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                full_name: name,
                phone: phone,
                email: email,
                password: password
            })
        });

        const data = await response.json();

        if (!response.ok) {
            if (response.status === 409) {
                emailError.textContent = "Email or phone already used";
            } else {
                successMessage.style.color = "#b00020";
                successMessage.textContent = data.message || "Failed to create account";
            }

            signupBtn.disabled = false;
            signupBtn.textContent = "Create Account";
            return false;
        }

        localStorage.setItem("userId", data.user.id);
        localStorage.setItem("userFullName", data.user.full_name);
        localStorage.setItem("userPhone", data.user.phone);
        localStorage.setItem("userEmail", data.user.email);
        localStorage.setItem("isLoggedIn", "true");

        successMessage.style.color = "#2e7d32";
        successMessage.textContent = "Account created successfully";

        setTimeout(() => {
            window.location.href = "index.html";
        }, 1000);

    } catch (error) {
        console.error(error);
        successMessage.style.color = "#b00020";
        successMessage.textContent = "Server connection failed";
        signupBtn.disabled = false;
        signupBtn.textContent = "Create Account";
    }

    return false;
}
</script>

</body>
</html>
