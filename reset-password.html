<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إعادة تعيين كلمة المرور</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      direction: rtl;
      background: #F3F5F7;
      color: #1F2937;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: white;
      border-radius: 28px;
      padding: 28px 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .title {
      font-size: 32px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 12px;
      color: #111827;
    }

    .subtitle {
      text-align: center;
      color: #6B7280;
      line-height: 1.8;
      margin-bottom: 24px;
      font-size: 15px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #374151;
    }

    .field input {
      width: 100%;
      padding: 14px;
      border: 1px solid #D1D5DB;
      border-radius: 16px;
      font-size: 15px;
      outline: none;
      background: #F9FAFB;
    }

    .field input:focus {
      border-color: #2563EB;
      background: white;
    }

    .btn {
      width: 100%;
      border: none;
      background: linear-gradient(90deg, #2F6FA3, #2A6797);
      color: white;
      padding: 15px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }

    .btn:hover {
      opacity: 0.95;
    }

    .msg {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
    }

    .success {
      color: #15803D;
    }

    .error {
      color: #B91C1C;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="title">إعادة تعيين كلمة المرور</div>
    <div class="subtitle">
      أدخلي كلمة المرور الجديدة، ثم احفظي التغيير.
    </div>

    <div class="field">
      <label>كلمة المرور الجديدة</label>
      <input type="password" id="newPassword" placeholder="أدخلي كلمة المرور الجديدة">
    </div>

    <div class="field">
      <label>تأكيد كلمة المرور</label>
      <input type="password" id="confirmPassword" placeholder="أعيدي إدخال كلمة المرور">
    </div>

    <button class="btn" onclick="resetPassword()">حفظ كلمة المرور</button>

    <div class="msg" id="messageBox"></div>
  </div>

  <script>
    async function resetPassword() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      const newPassword = document.getElementById("newPassword").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();
      const messageBox = document.getElementById("messageBox");

      messageBox.textContent = "";
      messageBox.className = "msg";

      if (!token) {
        messageBox.textContent = "الرابط غير صالح";
        messageBox.classList.add("error");
        return;
      }

      if (!newPassword || !confirmPassword) {
        messageBox.textContent = "يرجى تعبئة كل الحقول";
        messageBox.classList.add("error");
        return;
      }

      if (newPassword.length < 6) {
        messageBox.textContent = "كلمة المرور يجب أن تكون 6 أحرف على الأقل";
        messageBox.classList.add("error");
        return;
      }

      if (newPassword !== confirmPassword) {
        messageBox.textContent = "كلمتا المرور غير متطابقتين";
        messageBox.classList.add("error");
        return;
      }

      try {
        const response = await fetch("/api/reset-password", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            token: token,
            newPassword: newPassword
          })
        });

        const data = await response.json();

        if (!response.ok) {
          messageBox.textContent = data.message || "فشل تغيير كلمة المرور";
          messageBox.classList.add("error");
          return;
        }

        messageBox.textContent = "تم تغيير كلمة المرور بنجاح";
        messageBox.classList.add("success");

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1500);

      } catch (error) {
        console.error(error);
        messageBox.textContent = "فشل الاتصال بالسيرفر";
        messageBox.classList.add("error");
      }
    }
  </script>

</body>
</html>
