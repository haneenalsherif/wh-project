<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - WH App</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #FAF3E0, #EDE0D4);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #2F3E46;
        }

        .forgot-container {
            width: 100%;
            max-width: 420px;
            background-color: #FFFFFF;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .logo {
            text-align: center;
            font-size: 34px;
            font-weight: bold;
            color: #344E41;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #6B705C;
            margin-bottom: 28px;
            font-size: 15px;
            line-height: 1.6;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #344E41;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #DAD7CD;
            border-radius: 14px;
            font-size: 15px;
            background-color: #FAF3E0;
            outline: none;
        }

        .input-group input:focus {
            border-color: #A3B18A;
            background-color: #FFFFFF;
        }

        .btn {
            width: 100%;
            background-color: #A3B18A;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 14px;
        }

        .btn:hover {
            background-color: #8FA17A;
        }

        .back-link {
            text-align: center;
            font-size: 14px;
        }

        .back-link a {
            text-decoration: none;
            color: #344E41;
            font-weight: bold;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="forgot-container">
        <div class="logo">WH App</div>
        <div class="subtitle">
            Enter your email address and we will send you a link to reset your password.
        </div>

        <form action="login.html">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <button type="submit" class="btn">Send Reset Link</button>
        </form>

        <div class="back-link">
            <a href="login.html">Back to Sign In</a>
        </div>
    </div>

</body>
</html>
